<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Top 10 — Mondial 2026</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f6f7f9; --panel2:#ffffff; --line:#e3e7ec;
    --txt:#14181f; --muted:#6b7682; --accent:#e11d2e; --accent2:#0ea5e9;
    --gold:#e0a200; --silver:#8a93a0; --bronze:#c07a3e;
    --shadow:0 6px 22px rgba(15,23,42,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; padding:14px;
  }
  .wrap{width:100%; max-width:620px}

  header{margin-bottom:12px; text-align:center; position:relative}
  header h1{margin:0; font-size:18px; letter-spacing:.2px}
  header h1 b{color:var(--accent)}
  header p{margin:4px 0 0; font-size:12px; color:var(--muted)}

  .board{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:10px}
  .col{min-width:0; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:10px}
  .col h2{
    margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--muted); display:flex; align-items:center; gap:6px;
  }
  .col h2 .cnt{margin-left:auto; color:var(--accent); font-weight:700}

  /* ---- Pool (left) ---- */
  #pool{
    min-height:80px; max-height:540px; overflow-y:auto; overscroll-behavior:contain;
    display:flex; flex-direction:column; gap:7px; padding-right:4px;
    scrollbar-width:thin; scrollbar-color:#c7ced7 transparent;
  }
  #pool::-webkit-scrollbar{width:7px}
  #pool::-webkit-scrollbar-thumb{background:#c7ced7; border-radius:4px}
  #pool::-webkit-scrollbar-thumb:hover{background:#aab3bf}
  #pool::-webkit-scrollbar-track{background:transparent}
  .card{
    display:flex; align-items:center; gap:8px; background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; padding:6px 8px;
    cursor:grab; touch-action:none; user-select:none; transition:transform .08s, border-color .15s;
  }
  .card:active{cursor:grabbing}
  .card .ph{
    width:38px; height:38px; border-radius:50%; flex:0 0 38px; overflow:hidden;
    background:#eef1f4 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='38' height='38'><circle cx='19' cy='14' r='8' fill='%23c2cad3'/><rect x='5' y='26' width='28' height='16' rx='8' fill='%23c2cad3'/></svg>") center/cover;
    border:1px solid var(--line);
  }
  .card .ph img{width:100%; height:100%; object-fit:cover; display:block}
  .card .info{min-width:0; flex:1}
  .card .nm{font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .card .ct{font-size:10.5px; color:var(--muted); margin-top:1px}
  .card .st{font-size:10.5px; color:var(--accent); margin-top:2px; font-variant-numeric:tabular-nums}
  .card .st .sep{color:var(--muted); margin:0 4px}
  .card .grip{color:#b3bbc5; font-size:14px; margin-left:2px}

  /* ---- Ranking (right) ---- */
  #ranking{display:flex; flex-direction:column; gap:6px}
  .slot{
    display:flex; align-items:center; gap:8px; min-height:48px;
    border:1px dashed var(--line); border-radius:10px; padding:5px 7px;
    background:rgba(15,23,42,.02); transition:border-color .15s, background .15s;
  }
  .slot .rank{
    flex:0 0 22px; text-align:center; font-weight:800; font-size:15px; color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .slot[data-rank="1"] .rank{color:var(--gold)}
  .slot[data-rank="2"] .rank{color:var(--silver)}
  .slot[data-rank="3"] .rank{color:var(--bronze)}
  .slot .empty{flex:1; font-size:11px; color:var(--muted); opacity:.5}
  .slot.filled{border-style:solid; background:var(--panel2); box-shadow:0 1px 3px rgba(15,23,42,.06)}
  .slot.over{border-color:var(--accent); background:rgba(225,29,46,.07)}

  .slotcard{display:flex; align-items:center; gap:8px; flex:1; min-width:0; cursor:grab; touch-action:none}
  .slotcard:active{cursor:grabbing}
  .slotcard .ph{
    width:34px;height:34px;border-radius:50%;flex:0 0 34px;overflow:hidden;border:1px solid var(--line);background:#eef1f4;
  }
  .slotcard .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .slotcard .nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slotcard .ct{font-size:10px;color:var(--muted)}
  .slotcard .st{font-size:10px;color:var(--accent);font-variant-numeric:tabular-nums}
  .slotcard .st .sep{color:var(--muted);margin:0 3px}
  .slot .rm{
    flex:0 0 auto; width:20px;height:20px;border-radius:50%;border:none;cursor:pointer;
    background:#eceff3;color:var(--muted);font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .slot .rm:hover{background:#fbe1e3;color:#e11d2e}

  /* drag clone */
  #drag-clone{
    position:fixed; z-index:9999; pointer-events:none; left:0; top:0;
    width:230px; box-shadow:var(--shadow); transform:translate(-50%,-50%) scale(1.03);
    opacity:.96;
  }
  #drag-clone .card,#drag-clone .slotcard{background:var(--panel2);border:1px solid var(--accent);border-radius:10px;padding:6px 8px}
  body.dragging{cursor:grabbing}
  body.dragging #pool.over-pool{outline:2px dashed var(--accent); outline-offset:2px; border-radius:10px}

  .toolbar{display:flex; gap:8px; margin-top:12px; justify-content:center}
  .btn{
    border:1px solid var(--line); background:var(--panel2); color:var(--txt);
    font-size:12px; padding:7px 14px; border-radius:9px; cursor:pointer;
  }
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700}
  .btn.primary:hover{filter:brightness(.94)}
  .btn:disabled{opacity:.55; cursor:default; filter:none}
  .hint{text-align:center; font-size:11px; color:var(--muted); margin-top:6px; min-height:14px}

  /* ---- Recap screen ---- */
  .recap{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px}
  .recap-head{display:flex; align-items:center; gap:8px}
  .recap-title{font-size:14px; font-weight:800}
  .recap-votes{margin-left:auto; font-size:11px; color:var(--accent); font-weight:700; white-space:nowrap}
  .recap-sub{font-size:11px; color:var(--muted); margin:4px 0 2px; line-height:1.4}
  .recap-note{font-size:11px; color:var(--accent2); margin:9px 0 0}
  .recap-loading{font-size:12px; color:var(--muted); padding:16px; text-align:center}
  #recapList{margin-top:10px}
  .rrow{display:flex; align-items:center; gap:9px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:7px 9px; margin-bottom:6px}
  .rrow .rk{flex:0 0 22px; text-align:center; font-weight:800; font-size:16px; color:var(--muted); font-variant-numeric:tabular-nums}
  .rrow[data-r="1"] .rk{color:var(--gold)}
  .rrow[data-r="2"] .rk{color:var(--silver)}
  .rrow[data-r="3"] .rk{color:var(--bronze)}
  .rrow .ph{width:36px; height:36px; border-radius:50%; flex:0 0 36px; overflow:hidden; border:1px solid var(--line); background:#eef1f4}
  .rrow .ph img{width:100%; height:100%; object-fit:cover; display:block}
  .rrow .info{min-width:0; flex:1}
  .rrow .nm{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .rrow .ct{font-size:10.5px; color:var(--muted); margin-top:1px}

  .share{margin-top:14px; text-align:center}
  .share h4{margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); font-weight:700}
  .share-btns{display:flex; gap:9px; justify-content:center; flex-wrap:wrap}
  .sbtn{
    display:inline-flex; align-items:center; gap:7px; border:none; cursor:pointer;
    color:#fff; font-size:12px; font-weight:600; padding:9px 14px; border-radius:9px;
    transition:filter .15s, transform .05s;
  }
  .sbtn:hover{filter:brightness(1.06)} .sbtn:active{transform:translateY(1px)}
  .sbtn svg{width:15px; height:15px; fill:currentColor}
  .sbtn.x{background:#111}
  .sbtn.fb{background:#1877f2}
  .sbtn.wa{background:#25d366}
  .sbtn.dl{background:var(--accent)}
  .sbtn.copy{background:#5b6776}
  .sbtn.nat{background:#0a7d57}
  #shMsg{margin-top:8px; font-size:11px; color:var(--accent); min-height:14px; font-weight:600}
  .foot{margin-top:12px; text-align:center; font-size:10px; color:var(--muted)}

  /* ============ MOBILE — 2 colonnes conservées, cartes compactes ============ */
  @media (max-width:540px){
    body{padding:8px}
    header h1{font-size:15px}
    header p{font-size:10.5px; line-height:1.35}

    .board{gap:6px}
    .col{padding:7px; border-radius:11px}
    .col h2{font-size:9.5px; letter-spacing:.6px; margin-bottom:7px; gap:4px}

    /* ---- cartes candidats : plus concentrées et moins larges ---- */
    #pool{gap:5px; max-height:64vh}
    .card{padding:5px; gap:6px; border-radius:9px}
    .card .ph{width:30px; height:30px; flex-basis:30px}
    .card .nm{font-size:11px; line-height:1.15}
    .card .ct{font-size:9px; margin-top:1px}
    .card .st{font-size:9px; margin-top:1px}
    .card .st .sep{margin:0 2px}
    .card .grip{display:none}                 /* on récupère de la largeur */

    /* ---- classement : emplacements compacts ---- */
    #ranking{gap:5px}
    .slot{min-height:42px; padding:4px 5px; gap:5px}
    .slot .rank{flex-basis:16px; font-size:13px}
    .slot .empty{font-size:9.5px}
    .slotcard{gap:6px}
    .slotcard .ph{width:28px; height:28px; flex-basis:28px}
    .slotcard .nm{font-size:11px; line-height:1.15}
    .slotcard .ct{font-size:9px}
    .slotcard .st{display:none}               /* stat déjà visible à gauche : on allège */
    .slot .rm{width:18px; height:18px; font-size:11px}

    .toolbar{gap:6px; margin-top:9px; flex-wrap:wrap}
    .btn{font-size:11.5px; padding:7px 12px}
    #drag-clone{width:180px}
  }

  /* très petits écrans (≤ 360px) : on resserre encore d'un cran */
  @media (max-width:360px){
    .card .nm,.slotcard .nm{font-size:10.5px}
    .card .ct,.card .st,.slotcard .ct,.slotcard .st{font-size:8.5px}
    .card .ph{width:27px; height:27px; flex-basis:27px}
  }
</style>
</head>

/* stat strings */
function statParts(p){
  const out = [L.stat.m(p.apps)];
  if(p.goals>0)   out.push(L.stat.g(p.goals));
  if(p.assists>0) out.push(L.stat.a(p.assists));
  return out;
}
function statHtml(p){ return statParts(p).join('<span class="sep">·</span>'); }
function statLine(p){ return statParts(p).join(' · '); }

function photo(p){
  return `<div class="ph"><img src="${p.img}" alt="" loading="lazy" onerror="this.remove()"></div>`;
}

function render(){
  // pool
  $pool.innerHTML = pool.map(id=>{

    }
    const p = byId[id];

/* ---------- placement logic ---------- */
function firstEmptySlot(){ return ranking.indexOf(null); }

function moveToSlot(id, from, targetSlot){
  if(from==='pool'){ pool = pool.filter(x=>x!==id); }
  else { ranking[Number(from)] = null; }

  const occupant = ranking[targetSlot];
  ranking[targetSlot] = id;

  if(occupant!=null && occupant!==id){
    if(from==='pool'){
      if(!pool.includes(occupant)) pool.unshift(occupant);
    } else {
      ranking[Number(from)] = occupant;
    }
  }
}
function moveToPool(id, from){
  if(from==='pool') return;
  ranking[Number(from)] = null;
  if(!pool.includes(id)) pool.push(id);
}

/* ---------- unified pointer drag & drop ---------- */
let drag = null;
const THRESH = 6;

function onDown(e){
  const handle = e.target.closest('.card, .slotcard');
  if(!handle) return;
  if(e.target.closest('.rm')) return;
  const id = Number(handle.dataset.id);
  const from = handle.dataset.from;
  const pt = point(e);
  drag = {id, from, startX:pt.x, startY:pt.y, started:false, clone:null, src:handle};
  window.addEventListener('pointermove', onMove, {passive:false});
  window.addEventListener('pointerup', onUp, {passive:false});
}
function point(e){ return {x:e.clientX, y:e.clientY}; }

function startDrag(){
  drag.started = true;
  document.body.classList.add('dragging');
  drag.src.style.opacity = '.35';
  const clone = document.createElement('div');
  clone.id = 'drag-clone';
  const p = byId[drag.id];
  clone.innerHTML = `<div class="card">${photo(p)}<div class="info">
      <div class="nm">${p.name}</div><div class="st">${statHtml(p)}</div></div></div>`;
  document.body.appendChild(clone);
  drag.clone = clone;
}
function onMove(e){
  if(!drag) return;
  const pt = point(e);
  if(!drag.started){
    if(Math.hypot(pt.x-drag.startX, pt.y-drag.startY) < THRESH) return;
    startDrag();
  }
  e.preventDefault();
  drag.clone.style.left = pt.x+'px';
  drag.clone.style.top  = pt.y+'px';
  highlight(pt);
}
function elUnder(pt){
  drag.clone.style.display='none';
  const el = document.elementFromPoint(pt.x, pt.y);
  drag.clone.style.display='';
  return el;
}
function dropTarget(pt){
  const el = elUnder(pt);
  if(!el) return null;
  const slot = el.closest('.slot');
  if(slot) return {type:'slot', idx:Number(slot.dataset.slot)};
  if(el.closest('#pool')) return {type:'pool'};
  return null;
}
function highlight(pt){
  document.querySelectorAll('.slot.over').forEach(s=>s.classList.remove('over'));
  $pool.classList.remove('over-pool');
  const t = dropTarget(pt);
  if(!t) return;
  if(t.type==='slot') $rank.children[t.idx].classList.add('over');
  else $pool.classList.add('over-pool');
}
function onUp(e){
  window.removeEventListener('pointermove', onMove);
  window.removeEventListener('pointerup', onUp);
  if(!drag){ return; }
  if(!drag.started){ drag=null; return; }
  const t = dropTarget(point(e));
  if(t){
    if(t.type==='slot') moveToSlot(drag.id, drag.from, t.idx);
    else moveToPool(drag.id, drag.from);
  }
  cleanup();
  render();
}
function cleanup(){
  document.body.classList.remove('dragging');
  if(drag && drag.clone) drag.clone.remove();
  drag = null;
}

/* ---------- click / dblclick ---------- */
document.addEventListener('click', e=>{
  const rm = e.target.closest('[data-remove]');
  if(rm){ moveToPool(ranking[Number(rm.dataset.remove)], rm.dataset.remove); render(); return; }
});
$pool.addEventListener('dblclick', e=>{
  const c = e.target.closest('.card'); if(!c) return;
  const slot = firstEmptySlot(); if(slot<0) return;
  moveToSlot(Number(c.dataset.id), 'pool', slot); render();
});
document.addEventListener('pointerdown', onDown);
document.getElementById('resetBtn').addEventListener('click', ()=>{

});

const FONT = 'system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function loadImg(src){
  return new Promise(res=>{ const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; });
}
function initials(n){ return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function ellipsize(ctx,text,maxW){
  if(ctx.measureText(text).width<=maxW) return text;
  let t=text; while(t.length>1 && ctx.measureText(t+'…').width>maxW) t=t.slice(0,-1);
  return t+'…';
}
function drawAvatar(ctx,p,im,cx,cy,r){
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.closePath();
  ctx.fillStyle='#eef1f4'; ctx.fill(); ctx.clip();
  if(im){ ctx.drawImage(im, cx-r, cy-r, r*2, r*2); }
  else{
    ctx.fillStyle='#c7ced7'; ctx.fillRect(cx-r,cy-r,r*2,r*2);
    ctx.fillStyle='#fff'; ctx.font='800 '+Math.round(r*0.8)+'px '+FONT;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(initials(p.name), cx, cy+1);
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.lineWidth=1.5; ctx.strokeStyle='#e3e7ec'; ctx.stroke();
}

async function buildTop10Canvas(){
    const list = rankedPlayers();
    const imgs={}; await Promise.all(list.map(async p=>{ imgs[p.id]=await loadImg(p.img); }));

    const RED='#e11d2e', INK='#14181f', MUT='#6b7682';
    const scale=2, W=680, pad=40;
    const headH=150, rowH=66, rowGap=8, listTop=headH+8, footerH=58;
    const n=Math.max(list.length,1);
    const H=listTop + n*rowH + (n-1)*rowGap + footerH;

    const cv=document.createElement('canvas');
    cv.width=W*scale; cv.height=H*scale;
    const ctx=cv.getContext('2d'); ctx.scale(scale,scale);

    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);

    // titre (centré, partie rouge)
    ctx.textBaseline='alphabetic';
    const t1=L.titlePre, t2=L.titleRed;
    ctx.font='800 27px '+FONT;
    const w1=ctx.measureText(t1).width, w2=ctx.measureText(t2).width;
    let tx=(W-(w1+w2))/2;
    ctx.textAlign='left';
    ctx.fillStyle=INK; ctx.fillText(t1, tx, 56);
    ctx.fillStyle=RED; ctx.fillText(t2, tx+w1, 56);
    // sous-titre
    ctx.textAlign='center'; ctx.fillStyle=MUT; ctx.font='400 14px '+FONT;
    ctx.fillText(L.imgSubtitle, W/2, 84);
    // divider
    ctx.strokeStyle='#e3e7ec'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad,108); ctx.lineTo(W-pad,108); ctx.stroke();

    if(!list.length){
      ctx.textAlign='center'; ctx.fillStyle=MUT; ctx.font='600 16px '+FONT;
      ctx.fillText(L.imgEmpty, W/2, listTop+40);
    }

    const medal=['#e0a200','#8a93a0','#c07a3e'];
    list.forEach((p,i)=>{
      const y=listTop + i*(rowH+rowGap);
      ctx.save(); rrect(ctx,pad,y,W-2*pad,rowH,12);
      ctx.fillStyle='#ffffff'; ctx.fill();
      ctx.lineWidth=1; ctx.strokeStyle='#e3e7ec'; ctx.stroke(); ctx.restore();

      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = i<3 ? medal[i] : MUT;
      ctx.font='800 24px '+FONT;
      ctx.fillText(String(i+1), pad+30, y+rowH/2+1);

      const cx=pad+78, cy=y+rowH/2;
      drawAvatar(ctx,p,imgs[p.id],cx,cy,24);

      const nx=pad+114;
      ctx.textAlign='left';
      ctx.fillStyle=INK; ctx.font='700 17px '+FONT; ctx.textBaseline='alphabetic';
      ctx.fillText(ellipsize(ctx,p.name,W-2*pad-160), nx, y+28);
      ctx.fillStyle=MUT; ctx.font='400 13px '+FONT;
      const cty=cname(p)+'   ';
      ctx.fillText(cty, nx, y+48);
      const cw=ctx.measureText(cty).width;
      ctx.fillStyle=RED; ctx.font='600 13px '+FONT;
      ctx.fillText(statLine(p), nx+cw, y+48);
    });

    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle=MUT; ctx.font='400 12px '+FONT;
    ctx.fillText(L.imgFoot, W/2, H-22);

    return cv;
}
const canvasToBlob = cv => new Promise(r=>cv.toBlob(r,'image/png'));

const VOTED_KEY = 'top10voted_v1';

function submitVote(){
  if(!CONFIG.votesUrl) return;
  if(localStorage.getItem(VOTED_KEY)) return;            // 1 vote par navigateur
  const ranking = rankedPlayers().map((p,i)=>({rank:i+1, id:p.id, name:p.name}));
  if(!ranking.length) return;
  const session = 't10-'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
  try{
    fetch(CONFIG.votesUrl, {
      method:'POST', mode:'no-cors', keepalive:true,
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({session, ranking, lang:LANG})
    });
    localStorage.setItem(VOTED_KEY, '1');
  }catch(_){}
}

// ajoute le vote du visiteur à une copie locale du décompte serveur
function mergeOwnVote(base){
  const t = JSON.parse(JSON.stringify(base||{}));
  rankedPlayers().forEach((p,i)=>{
    const r=i+1; const id=p.id;
    if(!t[id]) t[id]={};
    t[id][r] = (t[id][r]||0) + 1;
  });
  return t;
}
function totalFor(tally,id){ const o=tally[id]; if(!o) return 0; let s=0; for(const k in o) s+=o[k]; return s; }

// consensus rang par rang : pour chaque rang on prend le joueur (non encore placé)
// le plus voté à ce rang ; un joueur ne garde que sa meilleure place.
function computeConsensus(tally){
  const used=new Set(), res=[];
  for(let rank=1; rank<=10; rank++){
    let best=null, bestCount=-1, bestTot=-1;
    for(const p of PLAYERS){
      if(used.has(p.id)) continue;
      const c=(tally[p.id]&&tally[p.id][rank])||0;
      const tot=totalFor(tally,p.id);
      if(c>bestCount || (c===bestCount && tot>bestTot)){ best=p; bestCount=c; bestTot=tot; }
    }
    if(best){ used.add(best.id); res.push({rank, p:best, count:Math.max(bestCount,0)}); }
  }
  return res;
}

function renderRecap(tally, votes){
  document.getElementById('recapVotes').textContent = '';
  const cons = computeConsensus(tally);
  document.getElementById('recapList').innerHTML = cons.map(c=>{
    const p=c.p;
    return `<div class="rrow" data-r="${c.rank}">
      <div class="rk">${c.rank}</div>
      ${photo(p)}
      <div class="info">
        <div class="nm">${p.name}</div>
        <div class="ct">${p.flag} ${cname(p)}</div>
      </div>
    </div>`;
  }).join('');
}

async function loadResults(){
  const note=document.getElementById('recapNote');
  document.getElementById('recapList').innerHTML = `<div class="recap-loading">${L.recapLoading}</div>`;
  note.textContent='';
  let serverTally=null, serverVotes=0, ok=false;
  if(CONFIG.votesUrl){
    try{
      const sep = CONFIG.votesUrl.includes('?') ? '&' : '?';
      const r = await fetch(CONFIG.votesUrl + sep + '_=' + Date.now(), {method:'GET'});
      const data = await r.json();
      if(data && data.ok){ serverTally=data.tally||{}; serverVotes=+data.votes||0; ok=true; }
    }catch(_){}
  }
  let tally, votes;
  if(ok && serverVotes>0){ tally=serverTally; votes=serverVotes; }
  else {
    tally=mergeOwnVote({}); votes=1;
    if(!CONFIG.votesUrl) note.textContent = L.recapSoloNote;
    else if(!ok)         note.textContent = L.recapError;
  }
  renderRecap(tally, votes);
}

function showRecap(){
  submitVote();
  document.getElementById('viewBuild').hidden = true;
  document.getElementById('viewRecap').hidden = false;
  window.scrollTo(0,0);
  setTimeout(loadResults, CONFIG.votesUrl ? 800 : 0);  // laisse le POST se propager
}
function showBuild(){
  document.getElementById('viewRecap').hidden = true;
  document.getElementById('viewBuild').hidden = false;
  window.scrollTo(0,0);
}
document.getElementById('validateBtn').addEventListener('click', showRecap);
document.getElementById('backBtn').addEventListener('click', showBuild);

/* ================================================================
   APPLIQUER LA LANGUE AUX TEXTES STATIQUES
   ================================================================ */
function applyI18n(){
  document.documentElement.lang = L.htmlLang;
  document.title = L.docTitle;
  document.getElementById('title').innerHTML = L.titlePre + '<b>' + L.titleRed + '</b>';
  document.getElementById('subtitle').textContent = L.subtitle;
  document.getElementById('poolLabel').textContent = L.poolLabel;
  document.getElementById('rankLabel').textContent = L.rankLabel;
  document.getElementById('resetBtn').textContent = L.reset;
  document.getElementById('shareTitle').textContent = L.shareTitle;
  document.getElementById('lblCopy').textContent = L.copy;
  document.getElementById('lblNative').textContent = L.share;
  document.getElementById('lblImg').textContent = L.download;
  document.getElementById('foot').textContent = L.foot;
  document.getElementById('validateBtn').textContent = L.validate;
  document.getElementById('backBtn').textContent = L.back;
  document.getElementById('recapTitle').textContent = L.recapTitle;
  document.getElementById('recapSub').textContent = L.recapSub;
}

/* ================================================================
   AUTO-HAUTEUR POUR INTÉGRATION EN IFRAME (WordPress)
   Envoie la hauteur au parent ; le script d'embed ajuste l'iframe.
   ================================================================ */
function postHeight(){
  if(window.parent===window) return;
  var h = document.documentElement.scrollHeight;
  try{ window.parent.postMessage({type:'top10-height', height:h}, '*'); }catch(_){}
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);
if(window.ResizeObserver){ try{ new ResizeObserver(postHeight).observe(document.body); }catch(_){} }
setTimeout(postHeight, 300); setTimeout(postHeight, 1200);

applyI18n();
render();
postHeight();
</script>
